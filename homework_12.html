<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Адаптивная страница</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
}

.container{
    padding:20px;
}

img{
    width:100%;
    height:auto;
}

button{
    padding:15px;
    font-size:16px;
    border:none;
    background-color:#4CAF50;
    color:white;
    cursor:pointer;
}

/* Мобильные устройства (до 768px) */
@media (max-width:768px){

p{
    font-size:14px;
}

button{
    width:100%;
}

img{
    width:100%;
}

}

/* Планшеты (768px - 1024px) */
@media (min-width:768px) and (max-width:1024px){

p{
    font-size:18px;
}

button{
    width:250px;
    height:auto;
}

img{
    max-width:80%;
}

}

/* Десктопы (больше 1024px) */
@media (min-width:1024px){

body{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
}

p{
    font-size:20px;
}

button{
    width:200px;
}

img{
    max-width:600px;
    margin:auto;
}

}

</style>
</head>

<body>

<div class="container">
    <h1>Адаптивная веб-страница</h1>


    <img src="https://picsum.photos/800/400" alt="Пример изображения">

    <br><br>

    <button>Нажми меня</button>
</div>

</body>
</html>
